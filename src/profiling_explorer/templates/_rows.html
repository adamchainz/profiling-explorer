{% for row in rows %}
<tr>
  <td>{{ row.total_calls|intcomma }}
  <td>{{ row.tottime_ms|intcomma }}
  <td>{{ row.cumtime_ms|intcomma }}
  <td title="{{ row.full_filename }}"><button {% if not row.full_filename %}disabled{% endif %} class=copy-btn data-copy="{{ row.full_filename }}:{{ row.lineno }}" aria-label="Copy"><svg aria-hidden="true" width="18" height="18"><use href="#icon-copy"></use></svg></button>{% if row.filename %}{{ row.filename }}:{{ row.lineno }} {% endif %}<pe-funcname>{{ row.funcname }}</pe-funcname>
{% endfor %}
